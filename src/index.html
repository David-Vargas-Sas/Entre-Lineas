<!DOCTYPE html>

          <p class="hero-subtitle">M&aacute;s contexto, m&aacute;s criterio</p>

      </div>
    </div>
    <nav class="color-controls" aria-label="Categorias">
      <button class="nav-menu-toggle" id="navMenuToggle" type="button" aria-expanded="false" aria-label="Abrir menu">Menu</button>
      <a class="color-btn home-btn" href="./index.html" data-route="inicio">Inicio</a>
      <a class="color-btn" href="./politica.html" data-route="politica">Pol&iacute;tica</a>

      <form class="search-form" id="searchForm" role="search">

        <button type="submit">Buscar</button>
      </form>
      <div class="personalizar-wrapper" id="personalizarWrapper">

            <div class="location-item">
              <button class="location-option" type="button" data-toggle="ciudad">

              </button>
              <div class="location-submenu" id="sub-ciudad">

                <button class="submenu-item" type="button" data-value="manizales">Manizales</button>
              </div>
            </div>

            <div class="location-item">
              <button class="location-option" type="button" data-toggle="region">
                Regionales <span class="location-arrow" id="arrow-region" aria-hidden="true">⌄</span>
              </button>
              <div class="location-submenu" id="sub-region">
                <button class="submenu-item" type="button" data-value="andina">Regi&oacute;n Andina</button>
                <button class="submenu-item" type="button" data-value="caribe">Regi&oacute;n Caribe</button>
                <button class="submenu-item" type="button" data-value="pacifica">Regi&oacute;n Pac&iacute;fica</button>
                <button class="submenu-item" type="button" data-value="orinoquia">Orinoqu&iacute;a</button>
                <button class="submenu-item" type="button" data-value="amazonia">Amazonia</button>
                <button class="submenu-item" type="button" data-value="insular">Regi&oacute;n Insular</button>
              </div>
            </div>

            <div class="location-item">
              <button class="location-option" type="button" data-toggle="continente">
                Continente <span class="location-arrow" id="arrow-continente" aria-hidden="true">⌄</span>
              </button>
              <div class="location-submenu" id="sub-continente">
                <button class="submenu-item" type="button" data-value="america-sur">Am&eacute;rica del Sur</button>
                <button class="submenu-item" type="button" data-value="america-norte">Am&eacute;rica del Norte</button>
                <button class="submenu-item" type="button" data-value="america-central">Am&eacute;rica Central</button>

                <button class="submenu-item" type="button" data-value="oceania">Ocean&iacute;a</button>

            <div class="location-item">

                Pa&iacute;s <span class="location-arrow" id="arrow-pais" aria-hidden="true">⌄</span>
              </button>
              <div class="location-submenu" id="sub-pais">
                <button class="submenu-item" type="button" data-value="colombia">Colombia</button>
                <button class="submenu-item" type="button" data-value="venezuela">Venezuela</button>
                <button class="submenu-item" type="button" data-value="brasil">Brasil</button>

                <button class="submenu-item" type="button" data-value="chile">Chile</button>
                <button class="submenu-item" type="button" data-value="usa">Estados Unidos</button>
                <button class="submenu-item" type="button" data-value="espana">Espa&ntilde;a</button>

  <div class="custom-cursor" id="customCursor" aria-hidden="true"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="./script.js"></script>

</html>
